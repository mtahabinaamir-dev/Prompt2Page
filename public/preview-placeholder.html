<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<title>Prompt2Page Preview</title>

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
        radial-gradient(circle at top,#2563eb 0%,#0f172a 55%,#020617 100%);

    font-family:Arial,sans-serif;

    overflow:hidden;

}

.container{

    width:520px;

    padding:55px;

    text-align:center;

    border-radius:28px;

    background:rgba(30,41,59,.82);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:

        0 30px 80px rgba(0,0,0,.45);

    animation:cardIn .8s ease;

}

.logo{

    font-size:58px;

    margin-bottom:20px;

    animation:float 3s ease-in-out infinite;

}

h1{

    color:#38bdf8;

    font-size:38px;

    margin-bottom:12px;

}

.subtitle{

    color:#cbd5e1;

    font-size:18px;

    line-height:1.8;

    margin-bottom:30px;

}

.tip{

    background:rgba(255,255,255,.05);

    border-radius:16px;

    padding:18px;

    color:#e2e8f0;

    line-height:1.8;

}

.tip strong{

    color:#38bdf8;

}

@keyframes cardIn{

    from{

        opacity:0;

        transform:translateY(30px) scale(.95);

    }

    to{

        opacity:1;

        transform:translateY(0) scale(1);

    }

}

@keyframes float{

    0%,100%{

        transform:translateY(0);

    }

    50%{

        transform:translateY(-8px);

    }

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

🤖

</div>

<h1>

Prompt2Page

</h1>

<p class="subtitle">

Your live website preview will appear here.

Create a page or switch to one to begin building.

</p>

<div class="tip">

<strong>Quick Start</strong>

<br><br>

📄 Create a page

<br>

<code>create page named home</code>

<br><br>

✏️ Add content

<br>

<code>add heading Welcome</code>

</div>

</div>

</body>

</html>
